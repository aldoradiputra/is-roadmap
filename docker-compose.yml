services:
  postgres:
    image: postgres:16-alpine
    container_name: kantr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kantr
      POSTGRES_PASSWORD: kantr_dev
      POSTGRES_DB: kantr_dev
    ports:
      - "5432:5432"
    volumes:
      - kantr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kantr -d kantr_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  kantr_postgres_data:
