<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Neutrals</title>
<style>
  body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 72px; border-radius: var(--r-md); border: 1px solid var(--border); }
  .name { font-weight: 600; font-size: 12px; color: var(--fg-1); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
</style></head>
<body><div class="card">
  <div class="label" style="margin-bottom: 16px;">Neutrals · text, surface, hairlines</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#2A2A36"></div><div class="name">Slate 2</div><div class="hex">#2A2A36</div></div>
    <div class="sw"><div class="chip" style="background:#4A4A5A"></div><div class="name">Slate · body</div><div class="hex">#4A4A5A</div></div>
    <div class="sw"><div class="chip" style="background:#6B7280"></div><div class="name">Muted</div><div class="hex">#6B7280</div></div>
    <div class="sw"><div class="chip" style="background:#E5E7EB"></div><div class="name">Border</div><div class="hex">#E5E7EB</div></div>
    <div class="sw"><div class="chip" style="background:#F8F9FB"></div><div class="name">Bg</div><div class="hex">#F8F9FB</div></div>
  </div>
</div></body></html>
