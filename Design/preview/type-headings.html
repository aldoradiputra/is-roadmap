<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Type — display + headings</title>
<style>
  body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); width: 130px; flex-shrink: 0; }
</style></head>
<body><div class="card stack">
  <div class="row"><span class="meta">DISPLAY · 56/1.05</span><span class="t-display" style="font-size:48px">Honest software.</span></div>
  <div class="row"><span class="meta">H1 · 32/1.15 · 700</span><span class="t-h1">Cash position is healthy</span></div>
  <div class="row"><span class="meta">H2 · 24/1.25 · 700</span><span class="t-h2">Pending approvals</span></div>
  <div class="row"><span class="meta">H3 · 18/1.35 · 600</span><span class="t-h3">Recent transactions</span></div>
</div></body></html>
