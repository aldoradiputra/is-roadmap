<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Shadow</title>
<style>
  body { display: grid; place-items: center; min-height: 100vh; padding: 24px; background: var(--bg); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 16px 8px; }
  .demo { background: var(--surface); height: 96px; border-radius: 8px; }
  .sm { box-shadow: 0 1px 2px rgba(15,23,42,0.04); border: 1px solid var(--border); }
  .md { box-shadow: 0 4px 12px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04); }
  .lg { box-shadow: 0 16px 40px rgba(15,23,42,0.12), 0 2px 6px rgba(15,23,42,0.06); }
  .name { font-weight: 600; font-size: 12px; color: var(--fg-1); margin-top: 12px; }
  .desc { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; }
</style></head>
<body><div class="card">
  <div class="label" style="margin-bottom: 8px;">Elevation — three levels</div>
  <div class="grid">
    <div><div class="demo sm"></div><div class="name">--shadow-sm</div><div class="desc">resting cards · sticky headers</div></div>
    <div><div class="demo md"></div><div class="name">--shadow-md</div><div class="desc">popovers · dropdowns</div></div>
    <div><div class="demo lg"></div><div class="name">--shadow-lg</div><div class="desc">modals · right-sliding sheets</div></div>
  </div>
</div></body></html>
