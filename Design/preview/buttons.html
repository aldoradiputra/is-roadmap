<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Buttons</title>
<style>
  body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 36px; padding: 0 14px; border-radius: 8px; font-family: var(--font-sans); font-size: 13px; font-weight: 600; border: 1px solid transparent; cursor: pointer; transition: background var(--d-fast) var(--ease), color var(--d-fast) var(--ease), border-color var(--d-fast) var(--ease); }
  .primary { background: var(--indigo); color: var(--white); }
  .primary.hover { background: var(--indigo-hover); }
  .primary:disabled, .primary.disabled { background: var(--indigo-light); color: #98a3e0; cursor: not-allowed; }
  .secondary { background: var(--surface); color: var(--fg-1); border-color: var(--border-strong); }
  .secondary.hover { background: var(--bg); }
  .ghost { background: transparent; color: var(--fg-1); }
  .ghost.hover { background: var(--indigo-light); color: var(--indigo); }
  .destructive { background: var(--red); color: var(--white); }
  .icon { width: 36px; padding: 0; }
  .focus { box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--indigo); outline: none; }
  .row > .label { width: 80px; flex-shrink: 0; }
</style></head>
<body><div class="card stack">
  <div class="row"><span class="label">DEFAULT</span>
    <button class="btn primary">Save</button>
    <button class="btn secondary">Cancel</button>
    <button class="btn ghost">Edit</button>
    <button class="btn destructive">Delete</button>
    <button class="btn secondary icon">+</button>
  </div>
  <div class="row"><span class="label">HOVER</span>
    <button class="btn primary hover">Save</button>
    <button class="btn secondary hover">Cancel</button>
    <button class="btn ghost hover">Edit</button>
  </div>
  <div class="row"><span class="label">FOCUS</span>
    <button class="btn primary focus">Save</button>
    <button class="btn secondary focus">Cancel</button>
  </div>
  <div class="row"><span class="label">DISABLED</span>
    <button class="btn primary disabled">Save</button>
    <button class="btn secondary" style="color: var(--fg-3); border-color: var(--border)">Cancel</button>
  </div>
</div></body></html>
