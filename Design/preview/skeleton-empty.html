<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Skeleton + empty state</title>
<style>
  body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { border: 1px solid var(--border); border-radius: 8px; padding: 16px; background: var(--surface); }
  .sk { background: var(--border); border-radius: 4px; height: 10px; animation: pulse 2.4s ease-in-out infinite; }
  .sk.h { height: 14px; }
  .sk.lg { height: 22px; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .empty { text-align: center; padding: 16px 8px; }
  .empty-svg { width: 88px; height: 64px; margin: 0 auto 12px; display: block; }
  .empty h4 { font-size: 14px; font-weight: 600; color: var(--fg-1); margin-bottom: 4px; }
  .empty p { font-size: 12px; color: var(--fg-3); margin-bottom: 14px; line-height: 1.55; }
  .btn { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 12px; border-radius: 8px; background: var(--indigo); color: white; font-size: 12px; font-weight: 600; border: 0; cursor: pointer; }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="panel stack">
      <div class="sk lg" style="width: 60%"></div>
      <div class="sk h" style="width: 100%"></div>
      <div class="sk h" style="width: 92%"></div>
      <div class="sk h" style="width: 78%"></div>
      <div style="display: flex; gap: 8px; margin-top: 4px;">
        <div class="sk" style="width: 60px"></div>
        <div class="sk" style="width: 80px"></div>
      </div>
      <div class="t-caption" style="margin-top: 8px;">Skeleton · single 2.4s opacity pulse, no shimmer</div>
    </div>
    <div class="panel empty">
      <svg class="empty-svg" viewBox="0 0 88 64" fill="none">
        <rect x="14" y="16" width="60" height="40" rx="4" fill="#E8EBFA" stroke="#C7CDF0" stroke-width="1.5"/>
        <rect x="22" y="24" width="44" height="3" rx="1.5" fill="#3B4FC4"/>
        <rect x="22" y="32" width="32" height="2" rx="1" fill="#C7CDF0"/>
        <rect x="22" y="38" width="38" height="2" rx="1" fill="#C7CDF0"/>
        <rect x="22" y="44" width="20" height="2" rx="1" fill="#C7CDF0"/>
        <circle cx="68" cy="14" r="6" fill="#1A2B5A"/>
        <path d="M65 14h6M68 11v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <h4>Belum ada faktur.</h4>
      <p>Buat faktur pertama Anda — atau impor dari spreadsheet untuk mengisi modul Finance.</p>
      <button class="btn">+ Buat faktur</button>
    </div>
  </div>
</div></body></html>
