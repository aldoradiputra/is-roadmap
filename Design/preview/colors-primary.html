<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Primary palette</title>
<style>
  body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
  .card { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 72px; border-radius: var(--r-md); border: 1px solid var(--border); }
  .name { font-weight: 600; font-size: 12px; color: var(--fg-1); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
</style></head>
<body><div class="card">
  <div class="label" style="margin-bottom: 16px;">Primary palette · brand + interactive</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#1A2B5A"></div><div class="name">Navy</div><div class="hex">#1A2B5A · brand anchor</div></div>
    <div class="sw"><div class="chip" style="background:#3B4FC4"></div><div class="name">Indigo</div><div class="hex">#3B4FC4 · primary action</div></div>
    <div class="sw"><div class="chip" style="background:#E8EBFA"></div><div class="name">Indigo Light</div><div class="hex">#E8EBFA · soft bg / hover</div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">Surface</div><div class="hex">#FFFFFF · cards, panels</div></div>
  </div>
</div></body></html>
