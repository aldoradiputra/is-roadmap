<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Sidebar items</title>
<style>
  body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
  .card { padding: 0; display: grid; grid-template-columns: 240px 56px 1fr; gap: 0; overflow: hidden; }
  .col { padding: 16px 12px; border-right: 1px solid var(--border); }
  .col:last-child { padding: 16px 20px; border-right: 0; }
  .item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; font-size: 13px; color: var(--fg-2); cursor: pointer; }
  .item.active { background: var(--indigo-light); color: var(--indigo); font-weight: 600; }
  .item.hover { background: var(--bg); }
  .item .icon { width: 18px; height: 18px; flex-shrink: 0; }
  .item .badge { margin-left: auto; font-size: 10px; font-weight: 700; color: var(--indigo); background: var(--surface); border: 1px solid var(--indigo-light); padding: 1px 6px; border-radius: 4px; }
  .iconcol { display: flex; flex-direction: column; align-items: center; gap: 6px; padding-top: 16px; }
  .icon-only { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 6px; color: var(--fg-2); }
  .icon-only.active { background: var(--indigo-light); color: var(--indigo); }
  .note { font-size: 11px; color: var(--fg-3); }
  svg { display: block; }
</style></head>
<body><div class="card">
  <div class="col">
    <div class="t-micro" style="margin-bottom: 8px; color: var(--fg-3);">Workspace</div>
    <div class="item"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg>HR &amp; Employees</div>
    <div class="item active"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>Finance<span class="badge">3</span></div>
    <div class="item hover"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 18l5-5 4 4 8-9"/><path d="M14 8h7v7"/></svg>Sales</div>
    <div class="item"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l4-4h10l4 4v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M3 9h18"/></svg>Procurement</div>
  </div>
  <div class="iconcol">
    <div class="icon-only" title="HR"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg></div>
    <div class="icon-only active" title="Finance"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg></div>
    <div class="icon-only"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 18l5-5 4 4 8-9"/><path d="M14 8h7v7"/></svg></div>
    <div class="icon-only"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l4-4h10l4 4v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M3 9h18"/></svg></div>
  </div>
  <div class="col" style="display:flex; flex-direction: column; gap: 8px;">
    <div class="t-micro" style="color: var(--fg-3); margin-bottom: 4px;">Sidebar</div>
    <div class="note"><strong>Expanded · 240px</strong> · default. Active item gets indigo-light plate, indigo text + a count chip if any.</div>
    <div class="note"><strong>Collapsed · 56px</strong> · icon-only. Active state preserved as a tinted plate.</div>
    <div class="note">Hover · subtle bg shift to <code class="mono">--bg</code>. No movement.</div>
  </div>
</div></body></html>
